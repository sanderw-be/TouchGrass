name: Sync Secrets to GitLab

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday (optional)

permissions:
  contents: read

jobs:
  sync-secrets:
    name: Sync Secrets to GitLab
    runs-on: ubuntu-latest
    
    steps:
      - name: Sync secrets to GitLab
        env:
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_ACCESS_TOKEN }}
          GITLAB_PROJECT_ID: '80755410'
          GITLAB_URL: 'https://gitlab.com'
          # GitHub secrets to sync
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          TOUCHGRASS_UPLOAD_STORE: ${{ secrets.TOUCHGRASS_UPLOAD_STORE }}
          TOUCHGRASS_UPLOAD_STORE_FILE: ${{ secrets.TOUCHGRASS_UPLOAD_STORE_FILE }}
          TOUCHGRASS_UPLOAD_STORE_PASSWORD: ${{ secrets.TOUCHGRASS_UPLOAD_STORE_PASSWORD }}
          TOUCHGRASS_UPLOAD_KEY_ALIAS: ${{ secrets.TOUCHGRASS_UPLOAD_KEY_ALIAS }}
          TOUCHGRASS_UPLOAD_KEY_PASSWORD: ${{ secrets.TOUCHGRASS_UPLOAD_KEY_PASSWORD }}
        run: |
          # Function to create or update a GitLab variable
          sync_variable() {
            local key=$1
            local value=$2
            
            echo "Syncing $key..."
            
            # Try to update first
            response=$(curl -s -w "\n%{http_code}" -X PUT \
              --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
              --form "value=$value" \
              --form "masked=true" \
              "$GITLAB_URL/api/v4/projects/$GITLAB_PROJECT_ID/variables/$key")
            
            http_code=$(echo "$response" | tail -n1)
            
            # If update failed (404), create new variable
            if [ "$http_code" = "404" ]; then
              echo "Variable $key not found, creating..."
              curl -s -X POST \
                --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
                --form "key=$key" \
                --form "value=$value" \
                --form "masked=true" \
                "$GITLAB_URL/api/v4/projects/$GITLAB_PROJECT_ID/variables"
            elif [ "$http_code" = "200" ]; then
              echo "✓ $key updated"
            else
              echo "✗ Failed to sync $key (HTTP $http_code)"
              exit 1
            fi
          }
          
          # Sync all secrets
          sync_variable "EXPO_TOKEN" "$EXPO_TOKEN"
          sync_variable "TOUCHGRASS_UPLOAD_STORE" "$TOUCHGRASS_UPLOAD_STORE"
          sync_variable "TOUCHGRASS_UPLOAD_STORE_FILE" "$TOUCHGRASS_UPLOAD_STORE_FILE"
          sync_variable "TOUCHGRASS_UPLOAD_STORE_PASSWORD" "$TOUCHGRASS_UPLOAD_STORE_PASSWORD"
          sync_variable "TOUCHGRASS_UPLOAD_KEY_ALIAS" "$TOUCHGRASS_UPLOAD_KEY_ALIAS"
          sync_variable "TOUCHGRASS_UPLOAD_KEY_PASSWORD" "$TOUCHGRASS_UPLOAD_KEY_PASSWORD"
          
          echo "✓ All secrets synced to GitLab"
