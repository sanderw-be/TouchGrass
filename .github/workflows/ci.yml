name: 1. CI — Check, Test & Update

permissions:
  pull-requests: read
  contents: read

on:
  pull_request:
    branches: [ beta ]
    types: [ opened, synchronize ]
  workflow_dispatch:
    inputs:
      run_screenshots:
        description: 'Run Maestro screenshots?'
        required: false
        type: boolean
        default: false
      force_native_build:
        description: 'Force Native Build?'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks-tests-preview:
    name: Run checks, Tests and Preview update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write # FIX: Corrected spelling from pull_requests and granted 'write' access
    outputs: {}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Run integration tests
        run: npx jest -c jest.integration.config.js

      - name: Regenerate AI Context
        run: |
          npx --yes codesight --profile copilot
          npx --yes codesight --wiki
          
          # Optional: Uncomment if you maintain Markdown docs, ADRs, or PRDs
          # npx codesight --mode knowledge ./docs 

      - name: Prettier format fix for Codesight
        run: npm run format

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AI context map [skip ci]"
          file_pattern: ".codesight/* .github/copilot-instructions.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Check for Native Changes
        id: native_check
        run: |
          if [ "${{ inputs.force_native_build }}" == "true" ]; then
            echo "native=true" >> $GITHUB_OUTPUT
            echo "🚨 Force Native Build selected via workflow_dispatch!"
            exit 0
          fi

          # 1. Determine what we are comparing against
          if [ "${{ github.event.action }}" == "synchronize" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          
          # 2. Safety check: if BASE is all zeros (e.g. a force push) or empty (e.g. workflow_dispatch without PR), fallback gracefully
          if [[ "$BASE" =~ ^0+$ ]] || [ -z "$BASE" ]; then
            BASE="${{ github.event.pull_request.base.sha || github.event.before || github.sha }}"
          fi
          
          echo "Comparing $BASE to HEAD..."
          
          # 3. Use git diff to list changed files and grep for our native paths
          if git diff --name-only $BASE ${{ github.sha }} | grep -qE '^package\.json$|^app\.json$|^app\.config\.js$|^ios/|^android/|^eas\.json$'; then
            echo "native=true" >> $GITHUB_OUTPUT
            echo "🚨 Native changes detected in this push!"
          else
            echo "native=false" >> $GITHUB_OUTPUT
            echo "✅ No native changes. Safe for OTA."
          fi

      - name: ⚡️ Cache npx
        uses: actions/cache@v3
        with:
          path: ~/.npm/_npx
          # We add a static string 'eas' to the key so it caches the CLI specifically
          key: ${{ runner.os }}-npx-eas-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-eas-

      - name: Publish EAS Update
        env:
          CI: 1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message || github.event.pull_request.title || github.sha }}
          # FIX:: Safe fallback for branch name if triggered via workflow_dispatch instead of PR
          BRANCH_NAME: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
        run: |
          # FIX: Appended `--json > update.json` so jq has a file to parse
          npx --yes eas-cli update --branch "$BRANCH_NAME" --platform android --message "$COMMIT_MESSAGE" --json > update.json
          
          # 2. Extract the manifestPermalink from the first item in the array
          RAW_URL=$(jq -r '.[0].manifestPermalink' update.json)
          
          # 3. URL Encode the permalink (required for the ?url= parameter)
          ENCODED_URL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$RAW_URL'))")
          
          # 4. Construct the final deep link
          FINAL_LINK="exp+touchgrass://expo-development-client/?url=$ENCODED_URL"
          
          echo "DEEP_LINK=$FINAL_LINK" >> $GITHUB_ENV

      - name: Comment PR with Deep Link
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **OTA Update Published!**
            [Tap here to test on your Development Client](${{ env.DEEP_LINK }})

      # --- PATH B: NATIVE CHANGES DETECTED ---
      - name: Configure Gradle for CI
        if: steps.native_check.outputs.native == 'true'
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx3072m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.logging.stacktrace=full
          EOF

      - name: Trigger EAS Build
        if: steps.native_check.outputs.native == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # FIX: Injected missing EXPO_TOKEN into environment
        run: |
          npx --yes eas-cli build --profile development --platform android --local --output ./dev-app.apk
          
      - name: Upload Dev APK Artifact
        if: steps.native_check.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: ./dev-app.apk
          retention-days: 7

      - name: Comment PR about Native Build
        # FIX: Added `github.event_name == 'pull_request'` to prevent crash on workflow_dispatch
        if: steps.native_check.outputs.native == 'true' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **Native Changes Detected!**
            A new development APK is currently building on EAS. Check the Expo dashboard to download it once finished.

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true
