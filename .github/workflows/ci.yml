name: CI — Check, Test & Update

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks-tests-preview:
    name: Run checks, Tests and Preview update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Fix Prettier formatting (REMOVE)
        run: npm run format

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      - name: Regenerate AI Context
        run: |
          npx --yes codesight --profile copilot
          npx --yes codesight --wiki
          
          # Optional: Uncomment if you maintain Markdown docs, ADRs, or PRDs
          # npx codesight --mode knowledge ./docs 

      - name: Prettier format fix for Codesight
        run: npm run format

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AI context map [skip ci]"
          file_pattern: ".codesight/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        env:
          CI: 1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch preview --platform android --message "${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message || github.event.pull_request.title || github.sha }}" 

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  shoot-and-deliver:
    name: Take screenshots on PR
    needs: checks-tests-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Fetch Latest APK from Expo
        env:
          - EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Automatically asks Expo for the URL of your most recent successful Android preview build
          LATEST_BUILD_URL=$(npx eas-cli build:list --platform android --profile preview-emulator --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading from: $LATEST_BUILD_URL"
          curl -L -o app.apk "$LATEST_BUILD_URL"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Maestro
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            export PATH="$PATH:$HOME/.maestro/bin"
            adb install app.apk
            $HOME/.maestro/bin/maestro test .maestro/screenshot-flow.yaml --format junit --output outputlight/
            adb shell "cmd uimode night yes"
            $HOME/.maestro/bin/maestro test .maestro/screenshot-flow.yaml --format junit --output outputdark/

      - name: Send Screenshots to Discord
        if: always()
        run: |
          # This prevents Bash from crashing if it doesn't find any files
          shopt -s nullglob

          # Look for PNGs in the root folder AND the .maestro folder just to be safe!
          for file in *.png .maestro/*.png; do
            echo "Uploading $file..."
            curl -F "file1=@$file" \
                 -F "payload_json={\"content\": \"📸 Fresh screenshot delivered!\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          done