name: CI — Check, Test & Update

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks-tests-preview:
    name: Run checks, Tests and Preview update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Fix Prettier formatting (REMOVE)
        run: npm run format

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      - name: Regenerate AI Context
        run: |
          npx --yes codesight --profile copilot
          npx --yes codesight --wiki
          
          # Optional: Uncomment if you maintain Markdown docs, ADRs, or PRDs
          # npx codesight --mode knowledge ./docs 

      - name: Prettier format fix for Codesight
        run: npm run format

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AI context map [skip ci]"
          file_pattern: ".codesight/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Publish EAS Update
        env:
          CI: 1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch preview --platform android --message "${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message || github.event.pull_request.title || github.sha }}" 

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true
