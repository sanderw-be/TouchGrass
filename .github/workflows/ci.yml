name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# Set minimal permissions for GITHUB_TOKEN
permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install packages
        run: npm install

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Setup EAS Credentials
        run: |
          mkdir -p .gradle
          echo "TOUCHGRASS_UPLOAD_STORE_FILE=${{ secrets.TOUCHGRASS_UPLOAD_STORE_FILE}}" > .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_STORE_PASSWORD=${{ secrets.TOUCHGRASS_UPLOAD_STORE_PASSWORD}}" >> .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_KEY_ALIAS=${{ secrets.TOUCHGRASS_UPLOAD_KEY_ALIAS}}" >> .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_KEY_PASSWORD=${{ secrets.TOUCHGRASS_UPLOAD_KEY_PASSWORD}}" >> .gradle/gradle.properties

      - name: Build Android APK
        run: |
          echo "Building Android APK..."
          eas build --platform android --profile production --local --non-interactive --output ${{ github.workspace }}/TouchGrass.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchgrass-android-apk
          path: ${{ github.workspace }}/TouchGrass.apk
          retention-days: 30
          if-no-files-found: error

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for common issues
        run: |
          echo "Checking for syntax errors in TypeScript files..."
          npx tsc --noEmit --pretty
          echo "TypeScript check passed!"
