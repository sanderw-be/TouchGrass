name: 1. CI — Check, Test & Update

permissions:
  pull-requests: read
  contents: read

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      run_screenshots:
        description: 'Run Maestro screenshots?'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks-tests-preview:
    name: Run checks, Tests and Preview update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write # FIX: Corrected spelling from pull_requests and granted 'write' access
    outputs: {}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      - name: Regenerate AI Context
        run: |
          npx --yes codesight --profile copilot
          npx --yes codesight --wiki
          
          # Optional: Uncomment if you maintain Markdown docs, ADRs, or PRDs
          # npx codesight --mode knowledge ./docs 

      - name: Prettier format fix for Codesight
        run: npm run format

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AI context map [skip ci]"
          file_pattern: ".codesight/* .github/copilot-instructions.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Check for Native Changes
        id: native_check
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' && github.event.before || '' }}
          filters: |
            native:
              - 'package.json'
              - 'app.json'
              - 'app.config.js'
              - 'ios/**'
              - 'android/**'

      - name: ⚡️ Cache npx
        uses: actions/cache@v3
        with:
          path: ~/.npm/_npx
          # We add a static string 'eas' to the key so it caches the CLI specifically
          key: ${{ runner.os }}-npx-eas-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-eas-
      
      # --- PATH A: NO NATIVE CHANGES ---
      - name: Publish EAS Update
        if: steps.native_check.outputs.native == 'false'
        env:
          CI: 1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message || github.event.pull_request.title || github.sha }}
          # FIX:: Safe fallback for branch name if triggered via workflow_dispatch instead of PR
          BRANCH_NAME: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
        run: |
          # FIX: Appended `--json > update.json` so jq has a file to parse
          npx --yes eas-cli update --branch "$BRANCH_NAME" --platform android --message "$COMMIT_MESSAGE" --json > update.json
          echo "DEEP_LINK=$(jq -r '.manifests[0].uri' update.json)" >> $GITHUB_ENV

      - name: Comment PR with Deep Link
        # FIX: Added `github.event_name == 'pull_request'` to prevent crash on workflow_dispatch
        if: steps.native_check.outputs.native == 'false' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **OTA Update Published!**
            Tap here to test on your Development Client: ${{ env.DEEP_LINK }}

      # --- PATH B: NATIVE CHANGES DETECTED ---
      - name: Trigger EAS Build
        if: steps.native_check.outputs.native == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # FIX: Injected missing EXPO_TOKEN into environment
        run: |
          npx --yes eas-cli build --profile development --platform android --local --output ./dev-app.apk
          
      - name: Upload Dev APK Artifact
        if: steps.native_check.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: ./dev-app.apk
          retention-days: 7

      - name: Comment PR about Native Build
        # FIX: Added `github.event_name == 'pull_request'` to prevent crash on workflow_dispatch
        if: steps.native_check.outputs.native == 'true' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **Native Changes Detected!**
            A new development APK is currently building on EAS. Check the Expo dashboard to download it once finished.

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  shoot-and-deliver:
    name: Take screenshots on PR
    needs: checks-tests-preview
    if: >
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'UI')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_screenshots == true)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Maestro
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            export PATH="$PATH:$HOME/.maestro/bin"
            adb install dev-app.apk
            # FIX: Changed `--output` from folders to .xml files
            $HOME/.maestro/bin/maestro test .maestro/screenshot-flow.yaml --format junit --output outputlight.xml
            adb shell "cmd uimode night yes"
            $HOME/.maestro/bin/maestro test .maestro/screenshot-flow.yaml --format junit --output outputdark.xml

      - name: Send Screenshots to Discord
        if: always()
        run: |
          # This prevents Bash from crashing if it doesn't find any files
          shopt -s nullglob

          # Look for PNGs in the root folder AND the .maestro folder just to be safe!
          for file in *.png .maestro/*.png; do
            echo "Uploading $file..."
            curl -F "file1=@$file" \
                 -F "payload_json={\"content\": \"📸 Fresh screenshot delivered!\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          done