name: Generate Play Console App Signing Key

on:
  workflow_dispatch: 

jobs:
  generate-encrypted-key:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21' 
          distribution: 'temurin'

      - name: Create Encryption Public Key PEM
        env:
          ENCRYPTION_KEY_PEM: ${{ secrets.PLAY_CONSOLE_ENCRYPTION_KEY }}
        run: echo "$ENCRYPTION_KEY_PEM" > encryption_public_key.pem

      - name: Download PEPK Tool
        run: curl -L -o pepk.jar https://www.gstatic.com/play-apps-publisher-rapid/signing-tool/prod/pepk.jar

      - name: Export and Encrypt Key
        env:
          KEYSTORE_PATH: ${{ secrets.TOUCHGRASS_UPLOAD_STORE_FILE }} # This is now treated as a file path
          KEY_ALIAS: ${{ secrets.TOUCHGRASS_UPLOAD_KEY_ALIAS }}
          STORE_PASS: ${{ secrets.TOUCHGRASS_UPLOAD_STORE_PASSWORD }}
          KEY_PASS: ${{ secrets.TOUCHGRASS_UPLOAD_KEY_PASSWORD }}
        run: |
          java -jar pepk.jar \
            --keystore="$KEYSTORE_PATH" \
            --alias="$KEY_ALIAS" \
            --output=output.zip \
            --include-cert \
            --rsa-aes-encryption \
            --encryption-key-path=encryption_public_key.pem \
            --keystore-pass="pass:$STORE_PASS" \
            --key-pass="pass:$KEY_PASS"

      - name: Upload Encrypted Key Artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-console-encrypted-key
          path: output.zip
          retention-days: 1
