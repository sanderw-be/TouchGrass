name: Update Codesight AI Context

on:
  push:
#    branches:
#      - main
#      - master
  pull_request:
    branches:
      - main
      - master

# Necessary permission to push the updated files back to the branch
permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Codesight requires Node.js >= 18

      - name: Regenerate AI Context
        run: |
          npx --yes codesight --profile copilot
          npx --yes codesight --profile claude-code
          npx --yes codesight --profile codex
          npx --yes codesight --wiki
          
          # Optional: Uncomment if you maintain Markdown docs, ADRs, or PRDs
          # npx codesight --mode knowledge ./docs 

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AI context map [skip ci]"
          file_pattern: ".codesight/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
