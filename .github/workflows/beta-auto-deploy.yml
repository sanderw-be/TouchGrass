name: 2. CD - Merge to Beta (Deploy Preview)

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - beta
  workflow_dispatch:

jobs:
  # 1. Determine if native files changed
  check-native-changes:
    name: Check for Native Changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.native_check.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check paths
        id: native_check
        uses: dorny/paths-filter@v3
        with:
          filters: |
            native:
              - 'package.json'
              - 'app.json'
              - 'app.config.js'
              - 'ios/**'
              - 'android/**'
              - 'eas.json'

  # 2. Run Semantic Versioning ONLY if native changes exist
  version-bump:
    name: Semantic Versioning
    needs: check-native-changes
    if: needs.check-native-changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
        # List any plugins from your .releaserc.json that aren't defaults
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3. Automatically update the preview track (Runs for ALL merges)
  deploy-preview:
    name: Deploy to Preview
    needs: [check-native-changes, version-bump]
    # always() ensures this runs even if version-bump was skipped
    if: always() && needs.check-native-changes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Checks out the new tag if one was made, otherwise uses beta
          ref: ${{ needs.version-bump.outputs.new_release_git_tag || github.ref }}
          
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci

      - name: ⚡️ Cache npx
        uses: actions/cache@v3
        with:
          path: ~/.npm/_npx
          # We add a static string 'eas' to the key so it caches the CLI specifically
          key: ${{ runner.os }}-npx-eas-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-eas-

      - name: Publish Preview OTA Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message || github.event.pull_request.title || github.sha }}
        run: npx --yes eas-cli update --branch preview --platform android --message "$COMMIT_MESSAGE"
      
      # --- Native changes detected ---
      - name: Configure Gradle for CI
        if: needs.check-native-changes.outputs.native == 'true'
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx3072m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.logging.stacktrace=full
          EOF

      - name: Build Preview AAB
        if: needs.check-native-changes.outputs.native == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_PROFILE: preview-emulator
        run: npx --yes eas-cli build --profile preview-emulator --platform android --local --output ./preview-app.aab

      - name: Upload Preview AAB Artifact
        if: needs.check-native-changes.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: preview-aab
          path: ./preview-app.aab
          retention-days: 14
