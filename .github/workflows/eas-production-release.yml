name: EAS Production Build & Submit

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main, master]

# Set minimal permissions for GITHUB_TOKEN
permissions:
  contents: read

jobs:
  build-and-submit:
    name: EAS Remote Build + Play Store Submit
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Decode Google Service Account key
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY_BASE64" | base64 --decode > ./google-service-account.json
          if [ ! -s ./google-service-account.json ]; then
            echo "ERROR: Google service account key file is empty or missing"
            exit 1
          fi
          echo "✓ Google service account key decoded successfully"

      - name: EAS Production Build (remote)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Submit to Play Store
        run: eas submit --platform android --profile production --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Remove Google Service Account key
        if: always()
        run: rm -f ./google-service-account.json
