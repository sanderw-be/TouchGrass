name: 🔥 One-Time EAS Setup

on:
  workflow_dispatch:
  push:

# Give the action permission to commit back to the repo
permissions:
  contents: write

jobs:
  couch-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 👈 1. Bump this from 18 to 20
          
      - name: Authenticate with EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm       # 👈 2. Add this line to bypass the yarn crash
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Updates Library
        run: npx expo install expo-updates

      - name: Configure EAS Updates
        # --non-interactive works cleanly here because your app is already linked to an EAS Project ID
        run: eas update:configure --non-interactive

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json eas.json package.json package-lock.json
          git commit -m "🤖 Auto-configured EAS Updates from the couch"
          git push
