name: 3. CD - Merge to Main (Deploy Production)

permissions:
  pull-requests: read
  contents: write

on:
  push:
    branches:
      - main

jobs:
  check-native-changes:
    name: Check for Native Changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.native_check.outputs.native }}
    steps:
      - uses: actions/checkout@v4

      - name: Check paths
        id: native_check
        uses: dorny/paths-filter@v3
        with:
          filters: |
            native:
              - 'package.json'
              - 'app.json'
              - 'app.config.js'
              - 'ios/**'
              - 'android/**'
              - 'eas.json'

  deploy-production:
    needs: [check-native-changes]
    name: Production Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for semantic-release to find tags
          
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci

      - name: ⚡️ Cache npx
        uses: actions/cache@v3
        with:
          path: ~/.npm/_npx
          # We add a static string 'eas' to the key so it caches the CLI specifically
          key: ${{ runner.os }}-npx-eas-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-eas-

      # --- SCENARIO A: Native Build Required ---
      - name: Configure Gradle for CI
        if: needs.check-native-changes.outputs.native == 'true'
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx3072m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.logging.stacktrace=full
          EOF

      - name: Build AAB
        if: needs.check-native-changes.outputs.native == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_PROFILE: production
        run: npx --yes eas-cli build --profile production --platform android --local --output ./production-app.aab

      - name: Upload Production AAB Artifact
        if: needs.check-native-changes.outputs.native == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: production-aab
          path: ./production-app.aab
          retention-days: 14

      # --- SCENARIO B: JavaScript/Asset Changes Only ---
      - name: Publish Production OTA Update
        if: needs.check-native-changes.outputs.native == 'false'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx --yes eas-cli update --branch production --message "Production OTA Deployment"

      - name: Promote pre-release to full release
        if: needs.check-native-changes.outputs.native == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // GitHub returns releases in descending creation-date order (newest first),
            // so the first pre-release we find is always the most recent one.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const preRelease = releases.find(r => r.prerelease && !r.draft);
            if (!preRelease) {
              core.warning('No pre-release found to promote. Skipping.');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: preRelease.id,
              prerelease: false,
            });
            core.info(`Promoted release ${preRelease.tag_name} to full release.`);