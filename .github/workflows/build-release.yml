name: Build Release AAB

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

# Set minimal permissions for GITHUB_TOKEN
permissions:
  contents: read

env:
  NDK_VERSION: '27.1.12297006'

jobs:
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & NPM Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-gradle-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Android NDK
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Setup EAS Credentials
        run: |
          mkdir -p .gradle
          echo "TOUCHGRASS_UPLOAD_STORE_FILE=${{ secrets.TOUCHGRASS_UPLOAD_STORE_FILE}}" > .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_STORE_PASSWORD=${{ secrets.TOUCHGRASS_UPLOAD_STORE_PASSWORD}}" >> .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_KEY_ALIAS=${{ secrets.TOUCHGRASS_UPLOAD_KEY_ALIAS}}" >> .gradle/gradle.properties
          echo "TOUCHGRASS_UPLOAD_KEY_PASSWORD=${{ secrets.TOUCHGRASS_UPLOAD_KEY_PASSWORD}}" >> .gradle/gradle.properties

      - name: Build Android AAB
        run: |
          mkdir -p ./build-artifacts
          eas build --platform android --profile ${{ inputs.profile }} --local --non-interactive --output ./build-artifacts/touchgrass.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GRADLE_OPTS: '-Xmx3072m'

      - name: Remove signing credentials
        if: always()
        run: rm -f .gradle/gradle.properties

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: ./build-artifacts/touchgrass.aab
          retention-days: 90
          if-no-files-found: error
