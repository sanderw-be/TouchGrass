name: Automagical Screenshots 🦄

on:
  workflow_dispatch:
  push:

jobs:
  shoot-and-deliver:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # A very stable, standard Java distribution
          java-version: '17'

      - name: Setup Node & Expo
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate with EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm ci

      - name: Publish EAS Update
        env:
          CI: 1
        run: eas update --branch preview --platform android --message "Automagical screenshot run"

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
        
      - name: Fetch Latest APK from Expo
        run: |
          # Automatically asks Expo for the URL of your most recent successful Android preview build
          LATEST_BUILD_URL=$(npx eas-cli build:list --platform android --profile preview --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading from: $LATEST_BUILD_URL"
          curl -L -o app.apk "$LATEST_BUILD_URL"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

        # ... (the rest of your emulator setup)

      - name: Run Emulator and Maestro
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: playstore
          arch: x86_64
          profile: pixel_6
          script: |
            export PATH="$PATH:$HOME/.maestro/bin"
            adb install app.apk
            $HOME/.maestro/bin/maestro test .maestro/screenshot-flow.yaml --format junit --output output/

      - name: Send Screenshots to Discord
        run: |
          # This prevents Bash from crashing if it doesn't find any files
          shopt -s nullglob
          
          # Look for PNGs in the root folder AND the .maestro folder just to be safe!
          for file in *.png .maestro/*.png; do
            echo "Uploading $file..."
            curl -F "file1=@$file" \
                 -F "payload_json={\"content\": \"📸 Fresh screenshot delivered!\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          done

